<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Villa Investment Calculator — Bali</title>
<style>
  :root{
    --bg:#f4f4f2; --card:#ffffff; --ink:#111114; --muted:#8a8a92;
    --line:#ececeb; --line2:#e2e2e0;
    --green:#78be3f; --green-d:#5aa02a;
    --red:#d64545; --red-l:#e88a8a; --orange:#e6952f; --orange-d:#c76a1e;
    --field:#faf9f7; --shadow:0 1px 2px rgba(0,0,0,.04),0 8px 24px rgba(0,0,0,.05);
    --r:18px; --grp:#faf9f7; --segbg:#ededea; --oncard:#111114;
  }
  :root[data-theme="dark"]{
    --bg:#14151a; --card:#1e2027; --ink:#eceef2; --muted:#9a9ca6;
    --line:#2a2d36; --line2:#343843; --field:#23262e; --grp:#23262e; --segbg:#2a2d36; --oncard:#000000;
    --shadow:0 1px 2px rgba(0,0,0,.3),0 10px 26px rgba(0,0,0,.4);
  }
  :root[data-theme="dark"] .seg button.on{background:#eceef2;color:#14151a}
  :root[data-theme="dark"] .tabs button.on{background:#3a3e49;color:#fff}
  :root[data-theme="dark"] .plan.sel{border-color:#eceef2}
  :root[data-theme="dark"] .plan .pill{background:#eceef2;color:#14151a}
  :root[data-theme="dark"] .frow.hero{background:#1f2a17;border-color:#33461f}
  :root[data-theme="dark"] .plan .disc{background:#26331a;color:#9fd36a}

  /* mode visibility */
  .simple-only{display:none}
  body.simple .pro-only{display:none}
  body.simple .simple-only{display:block}
  body.simple .kpis.simple-only{display:grid}
  body.simple [data-adv]{display:none}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;
    font-size:15px;line-height:1.4;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1180px;margin:0 auto;padding:22px 18px 60px}
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:20px}
  .brand{display:flex;flex-direction:column;gap:2px}
  .brand h1{font-size:19px;margin:0;font-weight:650;letter-spacing:-.01em}
  .brand span{font-size:12.5px;color:var(--muted)}
  .toggles{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .seg{display:inline-flex;background:var(--segbg);border-radius:999px;padding:3px}
  .seg button{border:0;background:transparent;padding:7px 15px;border-radius:999px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer}
  .seg button.on{background:#111114;color:#fff}
  .rate-inline{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--muted)}
  .rate-inline input{width:78px;border:1px solid var(--line2);border-radius:8px;padding:5px 7px;font-size:12.5px;background:#fff}

  /* plans header */
  .plans-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .plans-hd h2{font-size:16px;margin:0;font-weight:650}
  .editbtn{border:1px solid var(--line2);background:#fff;border-radius:999px;padding:6px 13px;font-size:12.5px;font-weight:600;color:#55555c;cursor:pointer}
  .editbtn.on{background:#111114;color:#fff;border-color:#111114}
  a.editbtn{text-decoration:none;display:inline-flex;align-items:center;gap:5px}
  .urlin{border:1px solid var(--line2);background:var(--field);border-radius:8px;padding:6px 9px;font-size:12.5px;color:var(--ink);width:200px;outline:none}
  .urlin:focus{border-color:#bcbcbb}

  /* payment plan cards */
  .plans{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:18px}
  .plan{background:var(--card);border:1.5px solid var(--line);border-radius:var(--r);padding:18px;cursor:pointer;position:relative;transition:border-color .15s,box-shadow .15s}
  .plan:hover{border-color:#d8d8d5}
  .plan.sel{border-color:#111114;box-shadow:var(--shadow)}
  .plan .phead{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .plan .ptitle{font-weight:650;font-size:15px}
  .plan .pill{font-size:11px;font-weight:700;padding:4px 9px;border-radius:999px;background:#111114;color:#fff}
  .plan .disc{font-size:12px;font-weight:700;color:var(--green-d);background:#eaf5e0;padding:3px 8px;border-radius:999px;margin-right:6px}
  .plan .price{font-size:24px;font-weight:700;letter-spacing:-.02em}
  .plan .price .old{font-size:14px;color:#b9b9bd;text-decoration:line-through;font-weight:500;margin-left:7px}
  .bar{height:7px;border-radius:999px;background:#eee;display:flex;overflow:hidden;margin:14px 0 12px}
  .bar i{display:block;height:100%}
  .legs{display:flex;flex-direction:column;gap:7px}
  .leg{display:flex;align-items:center;gap:8px;font-size:12.5px;color:#55555c}
  .dot{width:9px;height:9px;border-radius:50%;flex:none}
  .leg b{color:var(--ink);font-weight:650;min-width:38px}

  /* plan editor */
  .peditor{margin-top:14px;border-top:1px dashed var(--line2);padding-top:12px}
  .peditor .erow{display:grid;grid-template-columns:58px 1fr 46px 26px;gap:7px;align-items:center;margin-bottom:7px}
  .peditor input{border:1px solid var(--line2);background:var(--field);border-radius:8px;padding:6px 7px;font-size:12.5px;width:100%;outline:none}
  .peditor input:focus{border-color:#bcbcbb}
  .peditor .hint{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;font-weight:600}
  .peditor .ehead{display:grid;grid-template-columns:58px 1fr 46px 26px;gap:7px;margin-bottom:5px}
  .xbtn{border:0;background:#f0eeeb;border-radius:7px;color:#999;font-size:15px;cursor:pointer;height:30px;line-height:1}
  .addrow{border:1px dashed var(--line2);background:#fff;border-radius:9px;padding:7px;font-size:12.5px;font-weight:600;color:#55555c;cursor:pointer;width:100%;margin-top:2px}
  .sumwarn{font-size:11.5px;margin-top:8px;font-weight:600}
  .sumwarn.ok{color:var(--green-d)} .sumwarn.bad{color:var(--red)}

  .grid{display:grid;grid-template-columns:1.35fr 1fr;gap:16px;align-items:start}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow)}
  .card .ch{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 4px}
  .card .ch h2{font-size:16px;margin:0;font-weight:650}

  /* inputs panel */
  .inputs{margin-bottom:16px}
  .inbody{padding:6px 20px 20px;display:grid;grid-template-columns:repeat(3,1fr);gap:14px 18px}
  .fld{display:flex;flex-direction:column;gap:5px}
  .fld label{font-size:11.5px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.03em}
  .fld .inw{display:flex;align-items:center;background:var(--field);border:1px solid var(--line2);border-radius:10px;padding:0 10px}
  .fld .inw:focus-within{border-color:#bcbcbb}
  .fld .inw span{font-size:12.5px;color:var(--muted)}
  .fld input{border:0;background:transparent;padding:9px 6px;font-size:14px;width:100%;font-variant-numeric:tabular-nums;color:var(--ink);outline:none;min-width:0}
  .sec-lbl{grid-column:1/-1;font-size:11px;font-weight:700;letter-spacing:.06em;color:#b3b3b6;text-transform:uppercase;margin-top:4px;border-top:1px solid var(--line);padding-top:12px}
  .sec-lbl:first-child{border-top:0;padding-top:0;margin-top:0}

  /* KPI strip */
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:16px}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px 16px;box-shadow:var(--shadow)}
  .kpi .k{font-size:11.5px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.03em}
  .kpi .v{font-size:24px;font-weight:700;letter-spacing:-.02em;margin-top:6px;font-variant-numeric:tabular-nums}
  .kpi .s{font-size:12px;color:var(--muted);margin-top:2px}
  .kpi.hl{background:var(--oncard);color:#fff}
  .kpi.hl .k,.kpi.hl .s{color:#a9a9ad}
  .kpi.hl .v{color:var(--green)}

  /* summary table */
  table{width:100%;border-collapse:collapse}
  .sumtbl{padding:4px 0 6px}
  thead th{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.04em;text-transform:uppercase;text-align:right;padding:12px 20px 10px;background:var(--grp)}
  thead th:first-child{text-align:left}
  tbody td{font-size:13.5px;text-align:right;padding:11px 20px;border-top:1px solid var(--line);font-variant-numeric:tabular-nums;white-space:nowrap}
  tbody td:first-child{text-align:left;color:#3a3a40}
  tr.grp td{background:var(--grp);color:#9a9aa0;font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:8px 20px;border-top:0}
  tr.strong td{font-weight:700;color:var(--ink)}
  td.neg{color:var(--red)}
  tr.net td{background:var(--oncard);color:#fff;font-weight:700}
  tr.net td.pos{color:var(--green)}
  .tabs{display:inline-flex;background:var(--segbg);border-radius:999px;padding:3px}
  .tabs button{border:0;background:transparent;padding:6px 13px;border-radius:999px;font-size:12.5px;font-weight:600;color:var(--muted);cursor:pointer}
  .tabs button.on{background:#fff;color:#111114;box-shadow:0 1px 2px rgba(0,0,0,.08)}

  /* donut */
  .fin{padding:8px 20px 22px}
  .donutwrap{display:flex;justify-content:center;margin:10px 0 18px}
  .donut{position:relative;width:230px;height:230px}
  .donut .ctr{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
  .donut .ctr small{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;font-weight:600}
  .donut .ctr b{font-size:23px;font-weight:700;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
  .fleg{display:flex;flex-direction:column;gap:10px}
  .frow{display:flex;align-items:center;gap:9px;font-size:13px}
  .frow .fname{color:#4a4a50;flex:1}
  .frow .fval{font-weight:650;font-variant-numeric:tabular-nums}
  .frow.hero{background:#eef7e6;border:1px solid #d7ecc4;border-radius:10px;padding:9px 11px;margin:-2px 0}
  .frow.hero .dot{width:11px;height:11px}
  .frow.hero .fname{color:var(--green-d);font-weight:700;font-size:13.5px}
  .frow.hero .fval{color:var(--green-d);font-weight:800;font-size:15.5px}

  /* cashflow chart */
  .cf{margin-top:16px}
  .cflegend{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--muted);padding:2px 20px 4px}
  .cflegend span{display:inline-flex;align-items:center;gap:6px}
  .cfcontrols{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;padding:8px 20px 2px}
  .cfcontrols .cflegend{padding:0}
  .cfbody{padding:6px 16px 18px}
  .cfchart{width:100%;height:260px}
  .amort{margin-top:16px}
  .amort .abody{padding:4px 0 8px;overflow:auto}
  .note{font-size:11.5px;color:var(--muted);padding:0 20px 16px;line-height:1.5}
  .foot{margin-top:22px;font-size:11.5px;color:#a7a7ab;text-align:center;line-height:1.6}

  @media(max-width:920px){
    .grid{grid-template-columns:1fr}
    .plans{grid-template-columns:1fr}
    .inbody{grid-template-columns:repeat(2,1fr)}
    .kpis{grid-template-columns:repeat(2,1fr)}
  }
  @media(max-width:520px){
    .inbody{grid-template-columns:1fr}
    .wrap{padding:16px 12px 44px}
    thead th,tbody td{padding-left:14px;padding-right:14px}
  }

  /* simple headline cards */
  .kpi.big .v{font-size:27px}
  .kpi .plain{font-size:12.5px;color:var(--muted);margin-top:3px;line-height:1.35}
  .simple-lead{font-size:13.5px;color:var(--muted);margin:2px 0 14px;max-width:640px;line-height:1.5}

  /* print / PDF one-pager */
  @media print{
    :root[data-theme="dark"]{--bg:#fff;--card:#fff;--ink:#111114;--muted:#6b6b72;--line:#e6e6e4;--line2:#e0e0de;--field:#fff;--grp:#f4f4f2;--oncard:#111114}
    body{background:#fff}
    .wrap{max-width:100%;padding:0}
    .toggles,.editbtn,#reset,.peditor,.cfcontrols .tabs,#cfTabs,.plans-hd .editbtn,.printbtn{display:none!important}
    .card{box-shadow:none;border:1px solid #e6e6e4;break-inside:avoid}
    .cf,.amort,.inputs{break-inside:avoid}
    .foot{display:none}
    @page{margin:14mm}
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <div class="brand">
      <h1>Villa Investment Calculator</h1>
      <span>Live returns on your assumptions — Bali leasehold</span>
    </div>
    <div class="toggles">
      <div class="seg" id="modeSeg">
        <button data-m="simple">Simple</button>
        <button data-m="pro" class="on">Pro</button>
      </div>
      <div class="rate-inline">1 USD =
        <input id="fx" type="number" value="16300" step="50"> IDR
      </div>
      <div class="seg" id="curSeg">
        <button data-cur="USD" class="on">USD</button>
        <button data-cur="IDR">IDR</button>
      </div>
      <a class="editbtn" id="backListing" target="_blank" rel="noopener">← Listing</a>
      <button class="editbtn" id="themeBtn" title="Toggle theme">◐ Dark</button>
      <button class="editbtn printbtn" id="printBtn">Print / PDF</button>
    </div>
  </div>

  <!-- Payment plans -->
  <div class="plans-hd">
    <h2>Payment plans</h2>
    <button class="editbtn pro-only" id="editPlans">Edit plans</button>
  </div>
  <div class="plans" id="plans"></div>

  <!-- Inputs -->
  <div class="card inputs">
    <div class="ch"><h2>Assumptions</h2>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <input id="listingUrl" class="urlin" type="text" placeholder="Listing link (URL for ← Listing button)">
        <button id="reset" class="tabs" style="cursor:pointer"><span style="padding:0 6px">Reset defaults</span></button>
      </div>
    </div>
    <div class="inbody" id="inputs"></div>
  </div>

  <!-- KPI strip (Pro) -->
  <div class="kpis pro-only" id="kpis"></div>

  <!-- Simple headline cards -->
  <p class="simple-lead simple-only" id="simpleLead"></p>
  <div class="kpis simple-only" id="simpleCards"></div>

  <div class="grid pro-only">
    <!-- Investment summary -->
    <div class="card">
      <div class="ch">
        <h2>Investment summary</h2>
        <div class="tabs" id="sumTabs">
          <button data-h="3">3 years</button>
          <button data-h="5" class="on">5 years</button>
          <button data-h="7">7 years</button>
          <button data-h="10">10 years</button>
        </div>
      </div>
      <div class="sumtbl"><table id="sumTable"></table></div>
      <div class="note" id="planNote"></div>
    </div>

    <!-- Financial structure donut -->
    <div class="card fin">
      <div class="ch" style="padding:18px 0 4px"><h2>Financial structure</h2></div>
      <div class="donutwrap"><div class="donut" id="donut"></div></div>
      <div class="fleg" id="fleg"></div>
    </div>
  </div>

  <!-- Cashflow chart -->
  <div class="card cf">
    <div class="ch"><h2>Cash flow over hold period</h2>
      <div class="tabs" id="cfTabs">
        <button data-h="5">5 yr</button>
        <button data-h="10" class="on">10 yr</button>
        <button data-h="15">15 yr</button>
        <button data-h="20">20 yr</button>
      </div>
    </div>
    <div class="cfcontrols">
      <div class="tabs" id="cfView">
        <button data-v="cumulative" class="on">Cumulative</button>
        <button data-v="annual">Annual</button>
        <button data-v="breakdown" class="pro-only">Breakdown</button>
        <button data-v="compare" class="pro-only">Compare plans</button>
      </div>
      <div class="cflegend" id="cfLegend"></div>
    </div>
    <div class="cfbody"><svg class="cfchart" id="cfchart" preserveAspectRatio="none"></svg></div>
    <div class="note" id="cfCaption"></div>
  </div>

  <!-- Simple summary (plain, per year) -->
  <div class="card simple-only" id="simpleSummaryCard">
    <div class="ch"><h2>Where your money goes (per year)</h2></div>
    <div class="sumtbl"><table id="simpleSummary"></table></div>
    <div class="note" id="simpleNote"></div>
  </div>

  <!-- Leasehold amortization -->
  <div class="card amort pro-only">
    <div class="ch"><h2>Leasehold amortization &amp; resale value</h2></div>
    <div class="abody"><table id="amortTable"></table></div>
    <div class="note" id="amortNote"></div>
  </div>

  <div class="foot" id="foot"></div>
</div>

<script>
"use strict";

/* ---------- defaults ---------- */
const DEFAULTS = {
  price: 250000,
  furnishing: 15000,
  leaseTotal: 30,
  leaseRemain: 30,
  adr: 150,
  occ: 70,
  adrGrowth: 3,
  appr: 4,
  otaComm: 14.4,
  dirComm: 2,
  genCosts: 12.6,
  mgmtComm: 20,
  taxRate: 10,
  hold: 10,
  discount: 8,
  leaseFloor: 40,     // % of appreciated value retained at lease end (softens decay)
  saleAgent: 5,       // agent commission on resale %
  saleTax: 10         // investor sale tax %
};
let S = {...DEFAULTS};
let CUR = "USD";
let SUMH = "5";
let PLAN = "inst";
let EDIT = false;
let CHARTVIEW = "cumulative";
let MODE = "pro";      // "pro" | "simple"
let THEME = "light";   // "light" | "dark"

/* editable plans */
let PLANS = {
  full: { name:"Full prepayment", type:"full", discount:5,
          rows:[{pct:100,label:"On signing",month:0}] },
  inst: { name:"Installment plan", type:"inst", discount:0,
          rows:[
            {pct:50,label:"Down payment (on signing)",month:0},
            {pct:50,label:"On handover",month:12}
          ] }
};
const ROWCOLORS=["var(--orange)","var(--orange-d)","var(--red-l)","var(--red)","#e0b04a","#9a7bd6"];

/* ---------- helpers ---------- */
const $=id=>document.getElementById(id);
function fxRate(){return Number(S.fx||16300);}
function money(v){
  const val = CUR==="USD" ? v : v*fxRate();
  const sym = CUR==="USD" ? "$" : "Rp ";
  return (val<0?"−":"")+sym+Math.round(Math.abs(val)).toLocaleString("en-US");
}
function moneyShort(v){
  const val = CUR==="USD" ? v : v*fxRate();
  const sym = CUR==="USD" ? "$" : "Rp";
  const a=Math.abs(val); let s;
  if(a>=1e9) s=(val/1e9).toFixed(1).replace(/\.0$/,"")+"b";
  else if(a>=1e6) s=(val/1e6).toFixed(1).replace(/\.0$/,"")+"m";
  else if(a>=1e3) s=(val/1e3).toFixed(0)+"k";
  else s=Math.round(val).toString();
  return (val<0?"−":"")+sym+s.replace("-","");
}

/* ---------- financial engine ---------- */
function planPrice(p){ return S.price*(1-(p.discount||0)/100); }
function planSum(p){ return p.rows.reduce((a,r)=>a+(Number(r.pct)||0),0); }

function calc(){
  const p = PLANS[PLAN];
  const price = planPrice(p);
  const totalCashInvested = price*planSum(p)/100 + S.furnishing;

  const holdY = Math.max(1,Math.round(S.hold));
  const projN = Math.max(10, holdY);       // project operating rows out to 10y for summary tabs
  const rows = [];
  for(let y=1;y<=projN;y++){
    const g=Math.pow(1+S.adrGrowth/100,y-1);
    const revenue=S.adr*365*(S.occ/100)*g;
    const ota=revenue*S.otaComm/100;
    const dir=revenue*S.dirComm/100;
    const profAfterComm=revenue-ota-dir;
    const gen=revenue*S.genCosts/100;
    const mgmt=profAfterComm*S.mgmtComm/100;
    const pbt=profAfterComm-gen-mgmt;
    const tax=pbt*S.taxRate/100;
    const net=pbt-tax;
    rows.push({year:y,revenue,ota,dir,profAfterComm,gen,mgmt,pbt,tax,net});
  }
  const firstYear=rows[0];

  // annual cashflow buckets (chart & payback); purchase payments bucketed month→year
  const cashflow=[];
  let cum=0, payback=null;
  for(let y=0;y<=holdY;y++){
    let cf = y===0 ? -S.furnishing : rows[y-1].net;
    p.rows.forEach(r=>{ if(Math.round((Number(r.month)||0)/12)===y) cf -= price*(Number(r.pct)||0)/100; });
    let resaleNet=0;
    if(y===holdY){ resaleNet=resaleNet_(holdY); cf+=resaleNet; }
    cum+=cf;
    cashflow.push({year:y,net:cf,cum,op:(y===0?0:rows[y-1].net),resale:resaleNet});
    if(cum>=0 && payback===null) payback=y;
  }

  // precise dated flows for XIRR (months → fractional years)
  const flows=[{t:0,amt:-S.furnishing}];
  p.rows.forEach(r=>flows.push({t:(Number(r.month)||0)/12, amt:-price*(Number(r.pct)||0)/100}));
  for(let y=1;y<=holdY;y++) flows.push({t:y, amt:rows[y-1].net});
  flows.push({t:holdY, amt:resaleNet_(holdY)});
  const irr=computeIRR(flows);
  const npv=flows.reduce((a,f)=>a+f.amt/Math.pow(1+S.discount/100,f.t),0);
  const coc=firstYear.net/totalCashInvested*100;
  const totalOp=rows.slice(0,holdY).reduce((a,r)=>a+r.net,0);
  const resaleGross=resaleGross_(holdY);
  const resaleNet=resaleNet_(holdY);
  const saleCosts=resaleGross-resaleNet;
  const capGain=resaleNet-price;
  const totalReturn=totalOp+capGain;
  const roi=totalReturn/totalCashInvested*100;

  return {price,totalCashInvested,firstYear,rows,cashflow,irr,npv,coc,payback,
          totalOp,resaleGross,resaleNet,saleCosts,capGain,totalReturn,roi,years:holdY};
}

function decayFactor(atYear){
  const remain=Math.max(0,S.leaseRemain-atYear);
  const leaseFactor=S.leaseRemain>0?remain/S.leaseRemain:0;
  const floor=S.leaseFloor/100;
  return floor+(1-floor)*leaseFactor;   // softened: never below floor while lease runs
}
function resaleGross_(atYear){
  const market=Math.pow(1+S.appr/100,atYear);
  return S.price*market*decayFactor(atYear);
}
function resaleNet_(atYear){
  const gross=resaleGross_(atYear);
  return gross*(1-(S.saleAgent+S.saleTax)/100);
}

function computeIRR(flows){   // flows: [{t (years, can be fractional), amt}]
  const npvAt=r=>flows.reduce((a,f)=>a+f.amt/Math.pow(1+r,f.t),0);
  let lo=-0.95,hi=5,flo=npvAt(lo),fhi=npvAt(hi);
  if(flo*fhi>0) return null;
  for(let i=0;i<200;i++){
    const mid=(lo+hi)/2,fm=npvAt(mid);
    if(Math.abs(fm)<1e-6) return mid;
    if(flo*fm<0){hi=mid;fhi=fm;} else {lo=mid;flo=fm;}
  }
  return (lo+hi)/2;
}

// cashflow (annual buckets + XIRR) for any plan, reusing shared operating rows
function planCashflow(pKey, rows, holdY){
  const p=PLANS[pKey], price=planPrice(p);
  const cf=[]; let cum=0, pb=null;
  for(let y=0;y<=holdY;y++){
    let c=y===0?-S.furnishing:rows[y-1].net;
    p.rows.forEach(r=>{ if(Math.round((Number(r.month)||0)/12)===y) c-=price*(Number(r.pct)||0)/100; });
    if(y===holdY) c+=resaleNet_(holdY);
    cum+=c; cf.push({year:y,cum,op:(y===0?0:rows[y-1].net),net:c});
    if(cum>=0 && pb===null) pb=y;
  }
  const flows=[{t:0,amt:-S.furnishing}];
  p.rows.forEach(r=>flows.push({t:(Number(r.month)||0)/12, amt:-price*(Number(r.pct)||0)/100}));
  for(let y=1;y<=holdY;y++) flows.push({t:y, amt:rows[y-1].net});
  flows.push({t:holdY, amt:resaleNet_(holdY)});
  return {cf, irr:computeIRR(flows), payback:pb};
}

function planEditor(k,p){
  const sum=planSum(p);
  const okcls=sum===100?"ok":"bad";
  const rowsHtml=p.rows.map((r,i)=>`
    <div class="erow" data-i="${i}">
      <input type="number" data-f="pct" value="${r.pct}" step="any">

    </div>`).join("");

      <div class="hint" style="align-self:center">Discount %</div>

    </div>`;
  return `<div class="peditor" data-editor="${k}">
    ${discRow}
    <div class="ehead"><div class="hint">%</div><div class="hint">When (client text)</div><div class="hint">Month</div><div></div></div>
    ${rowsHtml}
    <button class="addrow" data-add="${k}">+ Add payment</button>
    <div class="sumwarn ${okcls}">Total: ${sum}% ${sum===100?"✓":"— should be 100%"}</div>

}

function wirePlanEditors(){
  $("plans").querySelectorAll(".peditor").forEach(ed=>{
    const k=ed.dataset.editor, p=PLANS[k];
    ed.querySelectorAll("input[data-f]").forEach(inp=>{
      inp.addEventListener("input",()=>{
        const f=inp.dataset.f;
        if(f==="discount"){ p.discount=parseFloat(inp.value)||0; }
        else{
          const i=+inp.closest(".erow").dataset.i;
          p.rows[i][f] = f==="label" ? inp.value : (parseFloat(inp.value)||0);
        }
        // light refresh (keep focus): update everything except re-injecting this editor's inputs
        softRefresh();
      });
    });
    ed.querySelectorAll("[data-x]").forEach(b=>b.addEventListener("click",()=>{
      p.rows.splice(+b.dataset.x,1); render();
    }));
    const add=ed.querySelector("[data-add]");
    if(add) add.addEventListener("click",()=>{ p.rows.push({pct:0,label:"Payment",month:6}); render(); });
  });
}

/* ---------- cashflow chart with Y axis ---------- */
function lg(items){return items.map(it=>`<span><i class="dot" style="background:${it[0]}"></i>${it[1]}</span>`).join("");}

function renderCashflow(R){
  const svg=$("cfchart"), view=CHARTVIEW;
  const W=760,H=272,padL=66,padR=18,padT=24,padB=30;
  const cf=R.cashflow, n=cf.length;
  const x=i=>padL+(W-padL-padR)*(i/(n-1||1));
  function axis(minV,maxV){
    const range=maxV-minV||1, step=niceStep(range/4);
    minV=Math.floor(minV/step)*step; maxV=Math.ceil(maxV/step)*step;
    const y=v=>padT+(H-padT-padB)*(1-(v-minV)/((maxV-minV)||1));
    let grid="",ylab="";
    for(let v=minV;v<=maxV+1e-6;v+=step){const yy=y(v);
      grid+=`<line x1="${padL}" y1="${yy.toFixed(1)}" x2="${W-padR}" y2="${yy.toFixed(1)}" stroke="${Math.abs(v)<1e-6?'#c7c7c6':'#f1f0ee'}" stroke-width="1"/>`;
      ylab+=`<text x="${padL-8}" y="${(yy+3.5).toFixed(1)}" font-size="10.5" fill="#9a9a9f" text-anchor="end">${moneyShort(v)}</text>`;}
    return {y,grid,ylab};
  }
  const xlab=cf.map((c,i)=>`<text x="${x(i).toFixed(1)}" y="${H-9}" font-size="10.5" fill="#9a9a9f" text-anchor="middle">Y${c.year}</text>`).join("");
  const yTitle=`<text transform="rotate(-90 14 ${(H/2).toFixed(0)})" x="14" y="${(H/2).toFixed(0)}" font-size="10.5" fill="#b6b6ba" text-anchor="middle">Cash, ${CUR}</text>`;
  let inner="", legend="", caption="";

  if(view==="cumulative"){
    const cum=cf.map(c=>c.cum), ann=cf.map(c=>c.op);
    const A=axis(Math.min(0,...cum,...ann),Math.max(0,...cum,...ann)), y=A.y, zeroY=y(0);
    const bw=Math.min(20,(W-padL-padR)/n*0.5);
    const bars=cf.map((c,i)=>i===0?"":`<rect x="${(x(i)-bw/2).toFixed(1)}" y="${(c.op>=0?y(c.op):zeroY).toFixed(1)}" width="${bw.toFixed(1)}" height="${Math.max(1,Math.abs(y(c.op)-zeroY)).toFixed(1)}" rx="2.5" fill="var(--orange)" opacity=".5"><title>Year ${c.year} · profit ${money(c.op)}</title></rect>`).join("");
    const linePath=cf.map((c,i)=>`${i?"L":"M"}${x(i).toFixed(1)},${y(c.cum).toFixed(1)}`).join(" ");
    const area=`${linePath} L${x(n-1).toFixed(1)},${zeroY.toFixed(1)} L${x(0).toFixed(1)},${zeroY.toFixed(1)} Z`;
    const dots=cf.map((c,i)=>`<circle cx="${x(i).toFixed(1)}" cy="${y(c.cum).toFixed(1)}" r="3.6" fill="${c.cum>=0?'var(--green)':'var(--red)'}"><title>Year ${c.year} · cumulative ${money(c.cum)}${c.resale?` (incl. resale ${money(c.resale)})`:''}</title></circle>`).join("");
    const pb=R.payback;
    const pbLine=pb!==null?`<line x1="${x(pb).toFixed(1)}" y1="${padT}" x2="${x(pb).toFixed(1)}" y2="${H-padB}" stroke="#c4c4c3" stroke-width="1" stroke-dasharray="3 3"/><text x="${x(pb).toFixed(1)}" y="${(padT-8).toFixed(1)}" font-size="10" font-weight="600" fill="#8a8a92" text-anchor="middle">break-even · Y${pb}</text>`:"";
    const last=cf[n-1];
    const totLbl=`<text x="${(x(n-1)-5).toFixed(1)}" y="${(y(last.cum)-10).toFixed(1)}" font-size="11.5" font-weight="700" fill="var(--green-d)" text-anchor="end">${money(last.cum)}</text>`;
    inner=`${A.grid}${A.ylab}<path d="${area}" fill="var(--green)" opacity=".09"/>${pbLine}${bars}<path d="${linePath}" fill="none" stroke="var(--green-d)" stroke-width="2.4"/>${dots}${totLbl}${xlab}${yTitle}`;
    legend=lg([["var(--green)","Cumulative net cash"],["var(--orange)","Annual profit"],["#c9c9c9","Break-even"]]);
  }
  else if(view==="annual"){
    const ann=cf.slice(1).map(c=>c.op);
    const A=axis(Math.min(0,...ann,0),Math.max(0,...ann)), y=A.y, zeroY=y(0);
    const bw=Math.min(32,(W-padL-padR)/n*0.62);
    const bars=cf.map((c,i)=>i===0?"":`<rect x="${(x(i)-bw/2).toFixed(1)}" y="${(c.op>=0?y(c.op):zeroY).toFixed(1)}" width="${bw.toFixed(1)}" height="${Math.max(1,Math.abs(y(c.op)-zeroY)).toFixed(1)}" rx="3" fill="var(--orange)" opacity=".85"><title>Year ${c.year} · ${money(c.op)}</title></rect>`).join("");
    const vlab=cf.map((c,i)=>i===0?"":`<text x="${x(i).toFixed(1)}" y="${(y(c.op)-6).toFixed(1)}" font-size="9.5" fill="#a06a1e" text-anchor="middle">${moneyShort(c.op)}</text>`).join("");
    inner=`${A.grid}${A.ylab}${bars}${vlab}${xlab}${yTitle}`;
    legend=lg([["var(--orange)","Annual operating profit"]]);
  }
  else if(view==="breakdown"){
    const segsDef=[["net","Net profit","var(--green)"],["tax","Tax","#a83232"],["mgmt","Management","var(--red)"],["gen","General costs","var(--orange)"],["dir","Direct comm.","#e0b04a"],["ota","OTA comm.","var(--red-l)"]];
    const maxRev=Math.max(...R.rows.slice(0,R.years).map(r=>r.revenue));
    const A=axis(0,maxRev), y=A.y;
    const bw=Math.min(32,(W-padL-padR)/n*0.62);
    let bars="";
    for(let i=1;i<n;i++){ const r=R.rows[i-1]; if(!r) continue; let acc=0;
      segsDef.forEach(sd=>{ const val=r[sd[0]]; const y0=y(acc), y1=y(acc+val); acc+=val;
        bars+=`<rect x="${(x(i)-bw/2).toFixed(1)}" y="${y1.toFixed(1)}" width="${bw.toFixed(1)}" height="${Math.max(0.4,y0-y1).toFixed(1)}" fill="${sd[2]}" opacity=".92"><title>Year ${r.year} · ${sd[1]} ${money(val)}</title></rect>`; });
    }
    inner=`${A.grid}${A.ylab}${bars}${xlab}${yTitle}`;
    legend=lg(segsDef.map(s=>[s[2],s[1]]));
  }
  else { // compare
    const a=planCashflow("full",R.rows,R.years), b=planCashflow("inst",R.rows,R.years);
    const all=a.cf.map(c=>c.cum).concat(b.cf.map(c=>c.cum),[0]);
    const A=axis(Math.min(...all),Math.max(...all)), y=A.y, zeroY=y(0);
    const drawLine=(cx,color)=>{const pth=cx.cf.map((c,i)=>`${i?"L":"M"}${x(i).toFixed(1)},${y(c.cum).toFixed(1)}`).join(" ");
      const d=cx.cf.map((c,i)=>`<circle cx="${x(i).toFixed(1)}" cy="${y(c.cum).toFixed(1)}" r="3" fill="${color}"><title>Year ${c.year} · ${money(c.cum)}</title></circle>`).join("");
      return `<path d="${pth}" fill="none" stroke="${color}" stroke-width="2.4"/>${d}`;};
    inner=`${A.grid}${A.ylab}<line x1="${padL}" y1="${zeroY.toFixed(1)}" x2="${W-padR}" y2="${zeroY.toFixed(1)}" stroke="#c7c7c6"/>${drawLine(a,'var(--green-d)')}${drawLine(b,'#3b7dd6')}${xlab}${yTitle}`;
    legend=lg([["var(--green-d)","Full prepayment"],["#3b7dd6","Installment"]]);
    const af=a.cf[a.cf.length-1].cum, bf=b.cf[b.cf.length-1].cum;
    caption=`At Year ${R.years}: Full prepayment ends at <b>${money(af)}</b> (IRR ${a.irr!==null?(a.irr*100).toFixed(1)+'%':'—'}), Installment at <b>${money(bf)}</b> (IRR ${b.irr!==null?(b.irr*100).toFixed(1)+'%':'—'}). ${af>=bf?'Full prepayment':'Installment'} returns more cash by exit.`;
  }

  svg.setAttribute("viewBox",`0 0 ${W} ${H}`);
  svg.innerHTML=inner;
  $("cfLegend").innerHTML=legend;
  if(view!=="compare") caption=`Selected plan · IRR <b>${R.irr!==null?(R.irr*100).toFixed(1)+'%':'—'}</b> · payback <b>${R.payback===null?'—':'Y'+R.payback}</b> · total ROI <b>${R.roi.toFixed(0)}%</b> (${money(R.totalReturn)}). Resale is net of ${S.saleAgent}% agent + ${S.saleTax}% sale tax.`;
  $("cfCaption").innerHTML=caption;
}
function niceStep(x){
  const p=Math.pow(10,Math.floor(Math.log10(x||1)));
  const n=x/p;
  const m = n<1.5?1 : n<3?2 : n<7?5 : 10;
  return m*p;
}

/* ---------- amortization ---------- */
function renderAmort(R){
  const head=`<thead><tr><th>Year</th><th>Remaining lease</th><th>Gross resale value</th><th>Net after fees + tax</th></tr></thead>`;
  let body="<tbody>";
  for(let yv=0;yv<=R.years;yv++){
    const remain=Math.max(0,S.leaseRemain-yv);
    const gross=resaleGross_(yv), net=resaleNet_(yv);
    body+=`<tr${yv===R.years?' class="strong"':''}><td>Year ${yv}</td>
      <td>${remain} yr</td><td>${money(gross)}</td><td>${money(net)}</td></tr>`;
  }
  body+="</tbody>";
  $("amortTable").innerHTML=head+body;
  $("amortNote").innerHTML=`Value decay is driven by <b>remaining lease at purchase</b> (${S.leaseRemain} yr) — each year the remaining term drops,
    so the resale right is worth less. Resale = price × (1+appreciation)<sup>yrs</sup> × decay, with decay held above the
    <b>${S.leaseFloor}%</b> floor while the lease runs. Exit costs: agent <b>${S.saleAgent}%</b> + investor sale tax <b>${S.saleTax}%</b>
    (on gross sale price). At Year ${R.years}: gross ${money(R.resaleGross)}, exit costs −${money(R.saleCosts)},
    net <b>${money(R.resaleNet)}</b> → capital ${R.capGain>=0?"gain":"loss"} <b>${money(R.capGain)}</b> vs. purchase.`;
}

function renderPlanNote(R){
  const p=PLANS[PLAN];
  const sum=planSum(p);
  const warn=sum!==100?` <b style="color:var(--red)">Payments total ${sum}% (not 100%)</b>.`:"";
  $("planNote").innerHTML=`Plan: <b>${escapeHtml(p.name)}</b>${p.discount?` (${p.discount}% discount → ${money(R.price)})`:""}.
    Cash invested <b>${money(R.totalCashInvested)}</b>. NPV @ ${S.discount}% = <b>${money(R.npv)}</b>.${warn}
    Estimates for discussion, not a guarantee of returns.`;
}

/* ---------- orchestration ---------- */
function fullRender(){
  S.fx=Number($("fx").value)||16300;
  const R=calc();
  renderPlans();
  renderInputs();
  paint(R);
}
function softRefresh(){          // update outputs without rebuilding inputs (keeps focus)
  S.fx=Number($("fx").value)||16300;
  const R=calc();
  // refresh plan visuals (bars/legend/price) but not the editor inputs
  refreshPlanVisuals();
  paint(R);
}
function paint(R){
  renderKPIs(R);
  renderSimple(R);
  renderSummary(R);
  renderDonut(R);
  renderCashflow(R);
  renderAmort(R);
  renderPlanNote(R);
  syncCfTabs();
  $("foot").innerHTML=`Villa Investment Calculator · assumptions editable · ${CUR} @ 1 USD = ${Number(S.fx).toLocaleString()} IDR`;
}
function refreshPlanVisuals(){
  Object.entries(PLANS).forEach(([k,p])=>{
    const card=$("plans").querySelector(`.plan[data-plan="${k}"]`); if(!card) return;
    const pr=planPrice(p);
    card.querySelector(".price").innerHTML=`${p.discount?`<span class="disc">−${p.discount}%</span>`:""}${money(pr)}${p.discount?`<span class="old">${money(S.price)}</span>`:""}`;
    card.querySelector(".bar").innerHTML=p.rows.map((r,i)=>`<i style="width:${Number(r.pct)||0}%;background:${planColor(p,i)}"></i>`).join("");
    card.querySelector(".legs").innerHTML=p.rows.map((r,i)=>`<div class="leg"><span class="dot" style="background:${planColor(p,i)}"></span><b>${Number(r.pct)||0}%</b>${escapeHtml(r.label)}</div>`).join("");
    const warn=card.querySelector(".sumwarn");
    if(warn){const sum=planSum(p);warn.className="sumwarn "+(sum===100?"ok":"bad");warn.textContent=`Total: ${sum}% ${sum===100?"✓":"— should be 100%"}`;}
  });
}
const render=fullRender;

/* events */
$("curSeg").querySelectorAll("button").forEach(b=>{
  b.onclick=()=>{CUR=b.dataset.cur;$("curSeg").querySelectorAll("button").forEach(x=>x.classList.toggle("on",x===b));render();};
});
$("sumTabs").querySelectorAll("button").forEach(b=>{
  b.onclick=()=>{SUMH=b.dataset.h;$("sumTabs").querySelectorAll("button").forEach(x=>x.classList.toggle("on",x===b));renderSummary(calc());};
});
$("cfTabs").querySelectorAll("button").forEach(b=>{
  b.onclick=()=>{S.hold=parseInt(b.dataset.h,10);render();};
});
function syncCfTabs(){$("cfTabs").querySelectorAll("button").forEach(x=>x.classList.toggle("on",parseInt(x.dataset.h,10)===Math.round(S.hold)));}
$("cfView").querySelectorAll("button").forEach(b=>{
  b.onclick=()=>{CHARTVIEW=b.dataset.v;$("cfView").querySelectorAll("button").forEach(x=>x.classList.toggle("on",x===b));renderCashflow(calc());};
});
$("editPlans").onclick=()=>{EDIT=!EDIT;$("editPlans").classList.toggle("on",EDIT);$("editPlans").textContent=EDIT?"Done editing":"Edit plans";renderPlans();};
$("modeSeg").querySelectorAll("button").forEach(b=>{
  b.onclick=()=>{
    MODE=b.dataset.m;
    $("modeSeg").querySelectorAll("button").forEach(x=>x.classList.toggle("on",x===b));
    document.body.classList.toggle("simple",MODE==="simple");
    if(MODE==="simple" && (CHARTVIEW==="breakdown"||CHARTVIEW==="compare")){
      CHARTVIEW="cumulative";
      $("cfView").querySelectorAll("button").forEach(x=>x.classList.toggle("on",x.dataset.v==="cumulative"));
    }
    if(EDIT){EDIT=false;$("editPlans").classList.remove("on");$("editPlans").textContent="Edit plans";}
    render();
  };
});
$("themeBtn").onclick=()=>{
  THEME=THEME==="light"?"dark":"light";
  document.documentElement.setAttribute("data-theme",THEME);
  $("themeBtn").textContent=THEME==="light"?"◐ Dark":"◑ Light";
};
$("printBtn").onclick=()=>window.print();
$("fx").oninput=()=>softRefresh();
$("reset").onclick=()=>{S={...DEFAULTS};render();};

// back-to-listing button
const DEFAULT_LISTING="https://docs.google.com/spreadsheets/d/1hZfsLVapt8Tk1VgjHe_XLyQTnkV8ZrLn_GtJxpebSOA/edit";
function updateBackListing(){
  const u=$("listingUrl").value.trim(), btn=$("backListing");
  if(u){ btn.href=u; btn.style.display="inline-flex"; }
  else { btn.removeAttribute("href"); btn.style.display="none"; }
}
$("listingUrl").value=DEFAULT_LISTING;
$("listingUrl").addEventListener("input",updateBackListing);
updateBackListing();

render();
</script>
